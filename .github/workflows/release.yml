name: Build & Release

# Build native installers for Windows, macOS and Linux. A push of a version
# tag (e.g. v1.0.0), or a manual run with "publish_release" enabled, publishes
# them to a GitHub Release. A manual run with publishing disabled just uploads
# the installers as workflow run artifacts (useful for verifying the build).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release from this run'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npm run build

      - name: Package installers
        run: npx --no-install electron-builder --${{ matrix.platform }} --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installers
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        id: meta
        run: |
          if [ "${GITHUB_REF}" != "${GITHUB_REF#refs/tags/}" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
